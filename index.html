<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Josefin Sans',sans-serif;background:#1b301d;background-image:radial-gradient(ellipse 90% 65% at 50% 38%,rgba(89,144,95,.14) 0%,rgba(70,118,74,.06) 40%,rgba(40,78,44,.02) 62%,transparent 76%);color:#e8f0e2;cursor:none;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}

#cur{width:6px;height:6px;background:#5a8f5e;border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:screen}
#cur.big{width:28px;height:28px;opacity:.18}
body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-52%);width:900px;height:900px;background:radial-gradient(circle,rgba(61,102,68,.07),transparent 55%);pointer-events:none;z-index:0}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:9999;
  background:#1b301d;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#intro-mark{background:#1b301d;
  width:64px;height:64px;
  opacity:0;
  transform:scale(.85);
  animation:markIn .7s cubic-bezier(.16,1,.3,1) .3s forwards;
}
#intro-mark img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes markIn{
  to{opacity:1;transform:scale(1)}
}
#intro.fade{
  opacity:0;
  transition:opacity .6s ease .2s;
}

/* ── NAV ── */
nav{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid rgba(232,240,226,.05)}
.logo{display:flex;align-items:center;gap:.45rem;text-decoration:none}
.logo-mk{width:36px;height:36px;flex-shrink:0;background:#1b301d}
.logo-mk img{width:100%;height:100%;object-fit:cover;display:block}
.logo-words{display:flex;flex-direction:column;gap:3px;padding-top:5px}
.logo-each{font-family:'Josefin Sans',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#59905f;line-height:1}
.logo-forest{font-family:'Josefin Sans',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,240,226,.82);line-height:1}

/* ── MAIN ── */
main{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.hl-pre{font-family:'Instrument Serif',serif;font-size:clamp(2.6rem,5.5vw,4.8rem);font-weight:400;color:rgba(232,240,226,.88);letter-spacing:-.025em;line-height:1.06;display:block}
.hl-for{font-family:'Josefin Sans',sans-serif;font-size:clamp(.56rem,.9vw,.7rem);font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,240,226,.28);display:block;margin:.5rem 0 .3rem}
.hl-cyc-wrap{display:block;overflow:hidden;line-height:1.1}
.hl-cyc{font-family:'Instrument Serif',serif;font-size:clamp(2.6rem,5.5vw,4.8rem);font-weight:400;font-style:italic;color:rgba(90,143,94,.88);display:block;transition:opacity .38s ease,transform .38s ease;letter-spacing:-.025em;line-height:1.06}

.divider{width:1px;height:24px;background:linear-gradient(to bottom,transparent,rgba(232,240,226,.1),transparent);margin:2rem auto}

/* ── FORM ── */
.form-wrap{display:flex;flex-direction:column;align-items:center;gap:.8rem}
.form{
  display:flex;align-items:center;
  background:rgba(232,240,226,.05);
  border:1px solid rgba(232,240,226,.12);
  border-radius:999px;
  overflow:hidden;
  transition:border-color .3s, box-shadow .3s;
  height:42px;
}
.form:hover{
  border-color:rgba(90,143,94,.45);
  box-shadow:0 0 28px rgba(90,143,94,.2), 0 0 10px rgba(90,143,94,.13);
}
.form:focus-within{
  border-color:rgba(90,143,94,.5);
  box-shadow:0 0 36px rgba(90,143,94,.26), 0 0 14px rgba(90,143,94,.16);
}
.ei{background:transparent;border:none;padding:0 1.2rem;font-family:'Josefin Sans',sans-serif;font-size:.82rem;font-weight:300;letter-spacing:.06em;color:rgba(232,240,226,.8);width:210px;outline:none;height:100%}.ei:-webkit-autofill,.ei:-webkit-autofill:hover,.ei:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px #1b301d inset!important;-webkit-text-fill-color:rgba(232,240,226,.8)!important;caret-color:rgba(232,240,226,.8);transition:background-color 5000s ease-in-out 0s}
.ei::placeholder{color:rgba(232,240,226,.25)}
.form-sep{width:1px;height:16px;background:rgba(232,240,226,.1);flex-shrink:0}
.eb{background:transparent;border:none;padding:0 1.2rem;font-family:'Josefin Sans',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#59905f;cursor:none;transition:color .2s;height:100%;white-space:nowrap;flex-shrink:0}
.eb:hover{color:rgba(90,143,94,1)}

.form-note{font-family:'Josefin Sans',sans-serif;font-size:.56rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,240,226,.38)}

/* ── THANK YOU ── */
.eok{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:.5rem;
}
.eok-main{
  font-family:'Instrument Serif',serif;
  font-size:1.5rem;
  font-style:italic;
  color:rgba(90,143,94,.85);
  line-height:1.2;
}
.eok-sub{
  font-family:'Josefin Sans',sans-serif;
  font-size:.56rem;
  font-weight:300;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(232,240,226,.28);
}

/* ── COMING ── */
.coming{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;margin-top:1.8rem;padding:.4rem .9rem;border:1px solid rgba(232,240,226,.14);border-radius:999px;line-height:1;transition:box-shadow .3s,border-color .3s}.coming:hover{border-color:rgba(90,143,94,.3);box-shadow:0 0 14px rgba(90,143,94,.09)}
.coming-dot{width:4px;height:4px;border-radius:50%;background:#59905f;flex-shrink:0;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.coming-txt{font-family:'Josefin Sans',sans-serif;font-size:.56rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,240,226,.42);position:relative;top:1px}

/* ── FOOTER ── */
footer{position:relative;z-index:2;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:1.2rem 2.5rem;border-top:1px solid rgba(232,240,226,.05);gap:1rem}
.foot-l{font-family:'Josefin Sans',sans-serif;font-size:.48rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,240,226,.22)}
.foot-c{font-family:'Josefin Sans',sans-serif;font-size:.48rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,240,226,.22);text-align:center;white-space:nowrap}
.foot-r{font-family:'Josefin Sans',sans-serif;font-size:.48rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,240,226,.22);text-align:right}
</style>
</head>

      <div class="eok-main">Thank you for believing in this.</div>
      <div class="eok-sub">We'll let you know as soon as we're live.</div>
    </div>
  </div>

<footer>

  <span class="foot-c">© 2026 EachForest</span>
  <span class="foot-r">Ecologi B&nbsp;Corp partner</span>
</footer>

<script>
// ── EMAILJS INIT ──
// 1. Sign up free at emailjs.com
// 2. Add Gmail service → copy Service ID below
// 3. Create template with variable {user_email} → copy Template ID below
// 4. Copy your Public Key from Account → API Keys
emailjs.init("sYi2xzp_ry0A2bvbc");

var EJ_SERVICE  = "service_y59rze6";
var EJ_TEMPLATE = "template_enkof9c";

// ── CURSOR ──
var cur = document.getElementById('cur');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('button,input,a').forEach(function(el) {
  el.addEventListener('mouseenter', function() { cur.classList.add('big') });
  el.addEventListener('mouseleave', function() { cur.classList.remove('big') });
});

// ── INTRO ──
window.addEventListener('load', function() {
  var intro = document.getElementById('intro');
  setTimeout(function() {
    intro.classList.add('fade');
    setTimeout(function() { intro.style.display = 'none'; }, 900);
  }, 1600);
});

// ── CYCLING PHRASES ──
var phrases = [
  'your mum’s 50th birthday',
  'the arrival of your first child',
  'your company’s next chapter',
  'the love of your life',
  'your best friend’s wedding',
  'yourself, just because',
  'every person who believed in you',
  'a teammate who gave everything',
  'the world your children will inherit',
  'your parents’ anniversary',
  'a community that changed your life',
  'the next generation'
];
var el = document.getElementById('cyc'), ci = 0;
setInterval(function() {
  el.style.opacity = '0';
  el.style.transform = 'translateY(-8px)';
  setTimeout(function() {
    ci = (ci + 1) % phrases.length;
    el.textContent = phrases[ci];
    el.style.transform = 'translateY(8px)';
    requestAnimationFrame(function() { requestAnimationFrame(function() {
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }); });
  }, 380);
}, 2800);

// ── FORM SUBMIT ──
function sub() {
  var v = document.getElementById('ei').value.trim();
  if (!v || !v.includes('@')) {
    document.getElementById('ei').style.borderColor = 'rgba(220,80,80,.4)';
    setTimeout(function() { document.getElementById('ei').style.borderColor = ''; }, 1000);
    return;
  }

  var btn = document.getElementById('eb');
  btn.textContent = '...';
  btn.style.opacity = '.5';

  emailjs.send(EJ_SERVICE, EJ_TEMPLATE, { email: v })
    .then(function() {
      showThanks();
    }, function() {
      // fallback: still show thanks even if EmailJS not configured yet
      showThanks();
    });
}

function showThanks() {
  document.getElementById('form').style.display = 'none';
  document.getElementById('fnote').style.display = 'none';
  var eok = document.getElementById('eok');
  eok.style.display = 'flex';
  eok.style.opacity = '0';
  eok.style.transition = 'opacity .5s ease';
  requestAnimationFrame(function() { requestAnimationFrame(function() {
    eok.style.opacity = '1';
  }); });
}
</script>
</body>
</html>
